name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-cli:
    name: Build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact-name: cli-macos-universal
            cmake-args: -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          - os: ubuntu-22.04
            artifact-name: cli-linux-x64
            cmake-args: ""
          - os: windows-2022
            artifact-name: cli-windows-x64
            cmake-args: -G "Visual Studio 17 2022"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev \
            pkg-config

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download JUCE
        run: python scripts/download_juce.py

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Collect artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/projects/minihost_c/minihost_c dist/ || true
          cp build/projects/minihost_cpp/minihost_cpp dist/ || true
          cp build/projects/libminihost/libminihost.a dist/ || true
          cp projects/libminihost/minihost.h dist/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/projects/minihost_c/Release/minihost_c.exe dist/ || true
          cp build/projects/minihost_cpp/Release/minihost_cpp.exe dist/ || true
          cp build/projects/libminihost/Release/minihost.lib dist/ || true
          cp projects/libminihost/minihost.h dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/

  build-desktop:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Guard job: compiles the minihost_desktop GUI app (MINIHOST_BUILD_DESKTOP=ON,
    # MINIHOST_HEADLESS=OFF) so the ~7k lines of desktop code cannot silently
    # break under refactors of the C ABI or graph executor. Also runs a headless
    # smoke (--save-roundtrip) to prove the binary is not dead on arrival.
    # Backstop timeout well under the 6h default in case a headless-init hang
    # slips through.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            cmake-args: -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
            bin: build/projects/minihost_desktop/minihost_desktop.app/Contents/MacOS/minihost_desktop
            run-prefix: ""
            artifact-name: desktop-macos-universal
            artifact-path: build/projects/minihost_desktop/minihost_desktop.app
          - os: ubuntu-22.04
            cmake-args: ""
            bin: build/projects/minihost_desktop/minihost_desktop
            run-prefix: "xvfb-run -a"
            artifact-name: desktop-linux-x64
            artifact-path: build/projects/minihost_desktop/minihost_desktop
          - os: windows-2022
            cmake-args: -G "Visual Studio 17 2022"
            bin: build/projects/minihost_desktop/Release/minihost_desktop.exe
            run-prefix: ""
            artifact-name: desktop-windows-x64
            artifact-path: build/projects/minihost_desktop/Release/minihost_desktop.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev \
            xvfb \
            pkg-config

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download JUCE
        run: python scripts/download_juce.py

      - name: Configure CMake
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DMINIHOST_BUILD_DESKTOP=ON -DMINIHOST_HEADLESS=OFF
          ${{ matrix.cmake-args }}

      - name: Build desktop app
        run: cmake --build build --config Release --target minihost_desktop

      - name: Headless smoke (save round-trip + error paths)
        shell: bash
        timeout-minutes: 5
        run: |
          BIN="${{ matrix.run-prefix }} ${{ matrix.bin }}"
          cat > smoke_project.json <<'EOF'
          {
            "minihost_project_version": 1,
            "sample_rate": 48000,
            "block_size": 512,
            "nodes": [
              {"id": "in",  "kind": "input",  "channels": 2, "source": "in.wav"},
              {"id": "out", "kind": "output", "channels": 2, "sink": "out.wav", "bit_depth": 24}
            ],
            "edges": [{"src": "in", "dst": "out"}]
          }
          EOF

          # Happy path: parse + re-save must succeed and produce output.
          $BIN --save-roundtrip=smoke_project.json
          test -f smoke_project.resaved.json
          echo "round-trip output:"
          cat smoke_project.resaved.json

          # Error paths: the binary must fail cleanly, not crash or succeed.
          # Missing project file -> exit 1 (load failure).
          set +e
          $BIN --render-project=does_not_exist.json ; code=$?
          set -e
          test "$code" -eq 1 || { echo "expected exit 1 for missing project, got $code"; exit 1; }

          # Empty option value -> exit 2 (usage error).
          set +e
          $BIN --render-project= ; code=$?
          set -e
          test "$code" -eq 2 || { echo "expected exit 2 for empty value, got $code"; exit 1; }
          echo "error-path exit codes OK"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  build-wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.os }}
    # Backstop: build+test of all CPython versions completes in ~25 min; cap
    # well below the 6h default so a hang (e.g. a headless-init deadlock) fails
    # fast instead of burning runners.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            cibw_archs: arm64 x86_64
            artifact-name: wheels-macos
          - os: ubuntu-22.04
            cibw_archs: x86_64
            artifact-name: wheels-linux-x64
          - os: windows-2022
            cibw_archs: AMD64
            artifact-name: wheels-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-* cp314-*
          CIBW_SKIP: '*-musllinux_*'
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y curl alsa-lib-devel freetype-devel fontconfig-devel
            gtk3-devel mesa-libGL-devel libcurl-devel webkit2gtk3-devel pkgconfig &&
            python3 {project}/scripts/download_juce.py
          CIBW_BEFORE_ALL_MACOS: python3 {project}/scripts/download_juce.py
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=11.0
          CIBW_BEFORE_ALL_WINDOWS: python {project}/scripts/download_juce.py
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: pytest {project}/tests -v
        run: cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  aggregate:
    name: Aggregate artifacts
    runs-on: ubuntu-22.04
    needs: [build-cli, build-wheels, build-sdist]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release/cli/macos-universal
          mkdir -p release/cli/linux-x64
          mkdir -p release/cli/windows-x64
          mkdir -p release/wheels
          mkdir -p release/sdist

          # CLI binaries
          cp -r artifacts/cli-macos-universal/* release/cli/macos-universal/ || true
          cp -r artifacts/cli-linux-x64/* release/cli/linux-x64/ || true
          cp -r artifacts/cli-windows-x64/* release/cli/windows-x64/ || true

          # Wheels
          cp artifacts/wheels-*/*.whl release/wheels/ || true

          # Source distribution
          cp artifacts/sdist/*.tar.gz release/sdist/ || true

          # Summary
          echo "=== Release Contents ==="
          find release -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name: minihost-all
          path: release/

  release:
    name: Create release
    runs-on: ubuntu-22.04
    needs: [aggregate]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download aggregated artifacts
        uses: actions/download-artifact@v4
        with:
          name: minihost-all
          path: release

      - name: Create archives
        run: |
          cd release
          # Create platform-specific CLI archives
          tar -czvf ../minihost-cli-macos-universal.tar.gz -C cli/macos-universal .
          tar -czvf ../minihost-cli-linux-x64.tar.gz -C cli/linux-x64 .
          cd cli/windows-x64 && zip -r ../../../minihost-cli-windows-x64.zip . && cd ../..
          # Create wheels archive
          cd wheels && zip -r ../../minihost-wheels.zip . && cd ..
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            minihost-cli-macos-universal.tar.gz
            minihost-cli-linux-x64.tar.gz
            minihost-cli-windows-x64.zip
            minihost-wheels.zip
            release/sdist/*.tar.gz
          generate_release_notes: true
