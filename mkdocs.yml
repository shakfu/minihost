site_name: minihost
site_description: Minimal headless audio plugin host for VST3, AudioUnit, and LV2
site_url: https://shakfu.github.io/minihost
repo_url: https://github.com/shakfu/minihost
repo_name: shakfu/minihost

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - CLI Reference: cli.md
  - Python API: api_python.md
  - C API: api_c.md
  - Hosting Guide: hosting_guide.md
  - Changelog: changelog.md
